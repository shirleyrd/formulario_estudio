<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Ingreso</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Formulario de Trámites</h1>

    <form id="formTramites">

        <!-- Datos personales -->
        <fieldset>
            <legend>Datos Personales</legend>

            <label>Nombre:
                <input type="text" name="nombre" required>
            </label>
        </fieldset>

        <!-- Tipo de trámite -->
        <fieldset>
            <legend>Tipo de Trámite</legend>

            <select name="tramiteOpcion" id="tipoTramite">
                <option value="">--Seleccione--</option>
                <option value="jubilacion">Jubilacion</option>
                <option value="pension">Pension</option>
            </select>                     
        </fieldset>

        <!-- Se muestra si eligen "jubilacion" -->
        <div id="trabajandoBlock" style="display: none; margin-top: 10px;">
            <p>¿Está trabajando?</p>
            <label><input type="checkbox" name="trabajando" value="si"> Sí</label>
            <label><input type="checkbox" name="trabajando" value="no"> No</label>

           <div id="apuradoBlock" style="display: none; margin-top: 10px;">
              <label><input type="checkbox" name="apurado" value="si"> ¿Está apurado?</label>
           </div>
        </div>
        
        <fieldset>
            <label>Nacionalidad:</label>
                <select name="nacionalidad" id="nacionalidad">
                    <option value="argentino">Argentino</option>
                    <option value="extranjero">Extranjero</option>
                </select>                
        </fieldset> 

            
            <div id="migracionesDiv" style="display:none;"></div>

            <div class="info">
                    <button id="btnInfoMigraciones" class="btnInfo" type="button">
                        INFO
                    </button>
                  <div id="infoBox" style="display: none;">
                    <p>info a completar</p>
                  </div>            
            </div>     

<div id="bloquesJubilacion" style="display: none;">        
<fieldset>
       <legend>Certificaciones</legend>

       <label>
         <input type="checkbox" id="buscanEllos"> Buscan ellos
       </label>

       <!-- Oculto hasta que selecciono "¿Buscan ellos?" -->
         <div id="empresasBlock" style="display:none; margin-top:10px;">
             <label for="empresaSelect">Seleccione empresa:</label>
             <select id="empresaSelect">
               <option value="">--Seleccione--</option>
             </select>
             
             <input type="text" id="empresaOtra" placeholder="Ingrese nombre de empresa" style="display:none;">
             <button type="button" id="agregarEmpresa">Agregar</button>
             <ul id="listaEmpresas"></ul>
         </div>

         
       <label>
         <input type="checkbox" id="buscamosNos"> Buscamos nosotros
       </label>

       <!-- Oculto hasta que selecciono "Buscamos Nosotros" -->
         <div id="empresasNosBlock" style="display:none; margin-top:10px;">
             <label for="empresasSelect">Seleccione empresa:</label>
             <select id="empresaNosSelect">
               <option value="">--Seleccione--</option>               
             </select>
             <input type="text" id="empresaNosOtra" placeholder="Ingrese nombre de empresa" style="display:none;">
             <button type="button" id="agregarNosEmpresa">Agregar</button>
             <ul id="listaEmpresasNos"></ul>
         </div>


         <!--Boton para observaciones activar / desactivar observaciones-->
         
         <div class="observaciones">
            <button class="btnEmpresa" type ="button" id="btnObservacionEmpresas">Observaciones</button>
            <div id="observaBox" style= "display: none;">
                <textarea name="textarea" rows="10" cols="50" placeholder="Escribir aqui..."></textarea>
                <div id="observacionesGuardadas"></div>
                <button class="guardar" type="button" id="btnGuardarObservacion">Guardar</button>
            </div>
         </div>

<div id="uocraBlock">
        <p>¿Tiene UOCRA?</p>

        <label>
            <input type="radio" name="uocra" value="si"> Sí
        </label>

        <label>
            <input type="radio" name="uocra" value="no"> No
        </label>

        <!-- TODO lo que depende de "Sí" -->
    <div id="uocraContenido" style="display: none; margin-top: 10px;">

         <div>
           <label><input type="checkbox"> Tiene constancia</label>
           <label><input type="checkbox"> Pedir constancia</label>
         </div>

        <button type="button" id="btnObservacionUocra">Observaciones Uocra</button>

        <div id="observaBoxUocra" style="display: none;">
          <textarea id="uocraArea" placeholder="Escribir aquí..."></textarea>
          <button type="button" id="btnGuardarObservacionUocra">Guardar</button>
    
          <div id="observacionesGuardadasUocra"></div>
        </div>

    </div>

</div>      

</fieldset>




<fieldset>
    <legend>Autónomo</legend>   

    <div id="autonomoBlock" style="display: block; margin-top: 10px;">
        <p>¿Tiene autónomo?</p>
        <label><input type="radio" name="autonomo" value="si"> Sí</label>
        <label><input type="radio" name="autonomo" value="no"> No</label>

        <div id="sicamBlock" style="display: none; margin-top: 10px;">
              <label><input type="checkbox" name="sicam" value="si"> Hacer SICAM</label>
        </div>

        <button type="button" id="btnObservacionSicam">Observaciones Autonomo</button>

        <div id = "observaBoxSicam" style="display: none;">
            <textarea id="sicamArea" placeholder="Escribir aqui..."></textarea>
            <button type="button" id="btnGuardarObservacionSicam">Guardar</button>
            <div id="observacionesGuardadasSicam"></div>
        </div>
    </div>
</fieldset>

</div>


<!--Se muestra si eligen pension-->
<fieldset id ="fieldsetPension" style="display:none;">
    <legend>Pension</legend>
    <div id="pensionBlock" style="display: none; margin-left:20px;">           
            
            <label><input id = "chkPensionJubilado" type="radio" name="pension">Jubilado</label>
            <label><input id ="chkPensionActivo" type="radio" name="pension">En Actividad</label>        
            
    </div>

        <!-- Todo lo que depende de si es Jubilado-->

    <div id="pensionJubiladoContenido" style="display: none; margin-top: 10px;">
    
    <label>
        <input type="radio" name = "beneficio" value="tiene" id="radioTieneBeneficio"> Tiene nro de beneficio
    </label>
    <label>
        <input type="radio" name="beneficio" value="anses" id="radioAnses">
        Pedir en ANSES
    </label>

    <div id="beneficioBox" style="display: none; margin-top: 5px;">
        <label>Número de beneficio:</label>
        <input type="text" placeholder="Ingrese número de beneficio...">

        <button type="button" id="btnFijarBeneficio" style="display:none; margin-top:5px;">
        Confirmar
    </button>
    <div id="beneficioGuardado" style="margin-top:5px;"></div>
    </div>      

</div>
</fieldset>

        <div id="opcionesPension" style="display:none; margin-left:20px;">

            <label><input type="checkbox" name="partida_matrimonio"> Partida de matrimonio</label>

                <label><input type="checkbox" name="copias_dni"> Copias de DNI</label>
            </div>
        </div>

        </div>

        <label><input type="checkbox" id="chkConstruccion" name="construccion"> Construcción</label>

        <!-- Apartado Autónomo -->
        <div id="autonomoDiv" style="display:none;">
            <fieldset>
                <legend>Autónomo</legend>                
                <label><input type="checkbox" name="sicam"> Sicam</label>
            </fieldset>
        </div>

        <br>
        <button type="button" id="guardarBtn">Guardar</button>
        <button type="button" id="imprimirBtn">Imprimir</button>

    </form>

    <script src="formulario.js"></script>
</body>
</html>
