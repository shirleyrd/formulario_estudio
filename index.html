<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Ingreso</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Formulario de Trámites</h1>

    <form id="formTramites">

        <!-- Datos personales -->
        <fieldset>
            <legend>Datos Personales</legend>

            <label>Nombre:
                <input type="text" name="nombre" required>
            </label>
        </fieldset>

        <!-- Tipo de trámite -->
        <fieldset>
            <legend>Tipo de Trámite</legend>

            <select name="tramiteOpcion" id="tipoTramite">
                <option value="">--Seleccione--</option>
                <option value="jubilacion">Jubilacion</option>
                <option value="pension">Pension</option>
            </select>                     
        </fieldset>

        <!-- Se muestra si eligen "jubilacion" -->
        <div id="trabajandoBlock" style="display: none; margin-top: 10px;">
            <p>¿Está trabajando?</p>
            <label><input type="checkbox" name="trabajando" value="si"> Sí</label>
            <label><input type="checkbox" name="trabajando" value="no"> No</label>

           <div id="apuradoBlock" style="display: none; margin-top: 10px;">
              <label><input type="checkbox" name="apurado" value="si"> ¿Está apurado?</label>
           </div>
        </div>
        
        <fieldset>
            <label>Nacionalidad:</label>
                <select name="nacionalidad" id="nacionalidad">
                    <option value="argentino">Argentino</option>
                    <option value="extranjero">Extranjero</option>
                </select>                
        </fieldset> 

            
            <div id="migracionesDiv" style="display:none;">
                <label>
                    <input type="checkbox" name="anses"> Preguntar en Anses
                </label>
                <label>
                    <input type="checkbox" name="migraciones"> Migraciones
                </label>
            </div>

            <div class="info">
                    <button id="btnInfoMigraciones" class="btnInfo" type="button">
                        INFO
                    </button>
                  <div id="infoBox" style="display: none;">
                    <p>info a completar.</p>
                  </div>            
                </div>
        </fieldset>

        
            
            
    <fieldset>
       <legend>Certificaciones</legend>

       <label>
         <input type="checkbox" id="buscanEllos"> Buscan ellos
       </label>

       <!-- Oculto hasta que selecciono "¿Buscan ellos?" -->
         <div id="empresasBlock" style="display:none; margin-top:10px;">
             <label for="empresaSelect">Seleccione empresa:</label>
             <select id="empresaSelect">
               <option value="">--Seleccione--</option>
             </select>
             <input type="text" id="empresaOtra" placeholder="Ingrese nombre de empresa" style="display:none;">
             <button type="button" id="agregarEmpresa">Agregar</button>
             <ul id="listaEmpresas"></ul>
         </div>

         
       <label>
         <input type="checkbox" id="buscamosNos"> Buscamos nosotros
       </label>

       <!-- Oculto hasta que selecciono "Buscamos Nosotros" -->
         <div id="empresasNosBlock" style="display:none; margin-top:10px;">
             <label for="empresaSelect">Seleccione empresa:</label>
             <select id="empresaNosSelect">
               <option value="">--Seleccione--</option>               
             </select>
             <input type="text" id="empresaNosOtra" placeholder="Ingrese nombre de empresa" style="display:none;">
             <button type="button" id="agregarNosEmpresa">Agregar</button>
             <ul id="listaEmpresasNos"></ul>
         </div>
    </fieldset>
             
        

        

        <!-- Opciones para Pensión -->
        <div id="opcionesPension" style="display:none; margin-left:20px;">
            <h4>Documentación para Pensión</h4>
            <label><input type="checkbox" name="partida_defuncion"> Partida de defunción</label>
            <label><input type="checkbox" name="partida_matrimonio"> Partida de matrimonio</label>

            <p>¿Hijos?</p>
            <label><input type="radio" name="hijos" value="si"> Sí</label>
            <label><input type="radio" name="hijos" value="no"> No</label>

            <div id="opcionesHijos" style="display:none; margin-left:20px;">
                <label><input type="checkbox" name="partida_nacimiento"> Partida de nacimiento</label>
                <label><input type="checkbox" name="copias_dni"> Copias de DNI</label>
            </div>
        </div>

        <div id="diferencialesDiv" style="display:none;">
    <fieldset>
        <legend>Diferenciales</legend>

        <label><input type="checkbox" id="chkPetroleo" name="petroleo"> Petróleo</label>
        <div id="petroleoOpciones" style="display:none; margin-left:20px;">
            <label><input type="checkbox" name="cert_65"> Certificación 6.5</label><br>
            <label><input type="checkbox" name="cert_62"> Certificación 6.2</label>
        </div>

        <label><input type="checkbox" id="chkConstruccion" name="construccion"> Construcción</label>
        <div id="construccionOpciones" style="display:none; margin-left:20px;">
            <label><input type="checkbox" name="uocra"> UOCRA</label><br>
            <label><input type="checkbox" name="ieric"> IERIC</label>
        </div>
    </fieldset>
</div>

        <!-- Apartado Autónomo -->
        <div id="autonomoDiv" style="display:none;">
            <fieldset>
                <legend>Autónomo</legend>                
                <label><input type="checkbox" name="sicam"> Sicam</label>
            </fieldset>
        </div>

        <br>
        <button type="button" id="guardarBtn">Guardar</button>
        <button type="button" id="imprimirBtn">Imprimir</button>

    </form>

    <script src="formulario.js"></script>
</body>
</html>
